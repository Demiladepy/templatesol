name: 'Run create-solana-dapp'
description: 'Run create-solana-dapp with the given command and template'
inputs:
  cmd:
    description: 'The command to run'
    required: true
  node-version:
    description: 'The Node.js version to use.'
    required: true
  package-manager:
    description: 'The package manager to use.'
    required: true
  template:
    description: 'The template to install'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Environment
      uses: ./.github/workflows/actions/setup
      with:
        node-version: ${{ inputs.node-version }}
        package-manager: ${{ inputs.package-manager }}

    - name: Create and Build using create-solana-dapp
      run: |
        cd $(mktemp -d)
        BRANCH="${{ github.head_ref || github.ref_name }}"
        REPO="${{ github.event.pull_request.head.repo.full_name || github.repository }}"
        # Normalize template path for gh: URL (backslash -> forward slash)
        TEMPLATE="${{ inputs.template }}"
        TEMPLATE="${TEMPLATE//\\/\/}"
        echo "Installing from repo: $REPO, branch: $BRANCH, template: $TEMPLATE"
        # Skip create-solana-dapp's internal dependency install (it uses npm with strict flags),
        # then install with the selected package manager below.
        ${{ inputs.cmd }} --skip-install --template gh:${REPO}/${TEMPLATE}#${BRANCH} sandbox
        cd sandbox
        # Retry install up to 3 times to handle registry 500s (yarn/npm)
        install_with_retry() {
          local max=3 i=1
          while true; do
            if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
              pnpm install --no-frozen-lockfile && return 0
            elif [ "${{ inputs.package-manager }}" = "npm" ]; then
              npm install --legacy-peer-deps && return 0
            else
              ${{ inputs.package-manager }} install && return 0
            fi
            if [ $i -eq $max ]; then return 1; fi
            echo "Install attempt $i failed, retrying in 10s..."
            sleep 10
            i=$((i + 1))
          done
        }
        install_with_retry
        ${{ inputs.package-manager }} run ci
      shell: bash
